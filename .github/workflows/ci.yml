name: CipherGate checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  local-checks:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.22.3
          cache: npm
      - run: npm ci
      - run: npm run check

  nox-e2e:
    needs: local-checks
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.22.3
          cache: npm
      - run: npm ci
      - run: npm run test:nox
      - name: Upload Nox diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nox-e2e-diagnostics
          path: offchain-services.log
          if-no-files-found: warn
